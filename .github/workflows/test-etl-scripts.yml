name: Test ETL Scripts

on:
  push:
    branches: [main, "support/*", "feature/*", "bugfix/*", "sfc-gh-*/*"]
    paths:
      - "ETL/**"
      - "Tests/ETL/**"
      - "requirements-test.txt"
  pull_request:
    branches: ["**"]
    paths:
      - "ETL/**"
      - "Tests/ETL/**"
      - "requirements-test.txt"

permissions:
  contents: read

jobs:
  test-etl:
    name: Run ETL Script Tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install test dependencies
        run: pip install -r requirements-test.txt

      - name: Run tests
        run: python -m pytest "Tests/ETL/Informatica PowerCenter/" -v --tb=short
